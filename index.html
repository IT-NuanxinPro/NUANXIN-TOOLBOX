    <script>
      (() => {
        const recoveryKey = 'toolbox_asset_recovery_v1';

        window.addEventListener('error', (event) => {
          const target = event.target;
          const assetUrl = target?.href || target?.src;
          const lastRecoveryAt = Number(sessionStorage.getItem(recoveryKey) || 0);
          if (!assetUrl || Date.now() - lastRecoveryAt < 60_000) return;

          const url = new URL(assetUrl, window.location.href);
          if (url.origin !== window.location.origin || !url.pathname.startsWith('/assets/')) return;

          sessionStorage.setItem(recoveryKey, String(Date.now()));
          const cleanupTasks = [];

          if ('serviceWorker' in navigator) {
            cleanupTasks.push(
              navigator.serviceWorker.getRegistrations().then((registrations) =>
                Promise.all(registrations.map((registration) => registration.unregister()))
              )
            );
          }

          if ('caches' in window) {
            cleanupTasks.push(
              caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
            );
          }

          Promise.allSettled(cleanupTasks).finally(() => {
            window.location.replace(`/?asset-recovery=${Date.now()}`);
          });
        }, true);
      })();
    </script>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const cleanupKey = 'toolbox_sw_cleanup_v1';
          Promise.all([
            navigator.serviceWorker.getRegistrations().then((registrations) =>
              Promise.all(registrations.map((registration) => registration.unregister()))
            ),
            'caches' in window
              ? caches.keys().then((keys) =>
                  Promise.all(keys.filter((key) => key.startsWith('toolbox-')).map((key) => caches.delete(key)))
                )
              : Promise.resolve(),
          ]).then(() => {
            if (navigator.serviceWorker.controller && !sessionStorage.getItem(cleanupKey)) {
              sessionStorage.setItem(cleanupKey, '1');
              window.location.reload();
            } else {
              sessionStorage.removeItem(cleanupKey);
            }
          }).catch(() => {});
        });
      }
    </script>
