<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blur circles -->
  <circle cx="1000" cy="100" r="200" fill="#667eea" opacity="0.1"/>
  <circle cx="200" cy="500" r="150" fill="#764ba2" opacity="0.08"/>

  <!-- Logo placeholder -->
  <rect x="80" y="80" width="80" height="80" rx="20" fill="url(#accent)"/>
  <text x="120" y="135" font-family="system-ui, sans-serif" font-size="40" font-weight="900" fill="white" text-anchor="middle">暖</text>

  <!-- Title -->
  <text x="180" y="120" font-family="system-ui, sans-serif" font-size="36" font-weight="900" fill="white">暖心工作箱</text>
  <rect x="180" y="135" width="60" height="24" rx="12" fill="white" opacity="0.15"/>
  <text x="210" y="152" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">v1.0</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="system-ui, sans-serif" font-size="52" font-weight="900" fill="white">33+ 开发者实用工具</text>
  <text x="80" y="320" font-family="system-ui, sans-serif" font-size="52" font-weight="900" fill="url(#accent)">纯本地 · 极速 · 安全</text>

  <!-- Description -->
  <text x="80" y="380" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8" font-weight="500">JSON/YAML · SQL美化 · 正则测试 · JWT调试 · RSA/AES · HTTP测试 · 代码场</text>

  <!-- Feature badges -->
  <g transform="translate(80, 430)">
    <rect x="0" y="0" width="180" height="36" rx="18" fill="white" opacity="0.08"/>
    <text x="90" y="23" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#cbd5e1" text-anchor="middle">🔒 100% 本地运算</text>

    <rect x="200" y="0" width="160" height="36" rx="18" fill="white" opacity="0.08"/>
    <text x="280" y="23" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#cbd5e1" text-anchor="middle">⚡ 毫秒级响应</text>

    <rect x="380" y="0" width="140" height="36" rx="18" fill="white" opacity="0.08"/>
    <text x="450" y="23" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#cbd5e1" text-anchor="middle">🎨 暗黑模式</text>

    <rect x="540" y="0" width="140" height="36" rx="18" fill="white" opacity="0.08"/>
    <text x="610" y="23" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#cbd5e1" text-anchor="middle">📱 PWA 离线</text>
  </g>

  <!-- URL -->
  <text x="80" y="560" font-family="ui-monospace, monospace" font-size="16" fill="#64748b" font-weight="600">tool.061129.xyz</text>
</svg>
